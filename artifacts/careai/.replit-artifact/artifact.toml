kind = "web"
previewPath = "/"
title = "CareAI"
version = "1.0.0"
id = "artifacts/careai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21392

[services.development]
run = "pnpm --filter @workspace/careai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/careai", "run", "build" ]
publicDir = "artifacts/careai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21392"
BASE_PATH = "/"
